{% extends "base.html" %}

{% block title %}Iniciar Sesión - FarmaOnline{% endblock %}

{% block content %}
<div class="login-container" style="max-width: 400px; margin: 0 auto;">
    <div class="card card-shadow">
        <div class="card-body">
            <h3 class="text-primary-custom text-center mb-4">
                <i class="fas fa-prescription-bottle"></i> Farmacia Cienfuegos
            </h3>
            <h5 class="text-center text-muted mb-4">Iniciar Sesión</h5>
            
            {% if form.errors %}
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-circle"></i> 
                    Usuario o contraseña incorrectos.
                </div>
            {% endif %}
            
            <form method="post" action={% url 'login' %}>
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" 
                           id="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" 
                           id="password" required>
                </div>
                <button type="submit" method="post" class="btn btn-primary-custom w-100" action={% url 'core:dashboard' %}>
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>
            
            <hr>
            <p class="text-muted text-center small">
                ¿No tienes cuenta? Contacta al administrador.
            </p>
        </div>
    </div>
</div>

<style>
    .login-container .card {
        border-radius: 20px;
        padding: 20px;
    }
    
    .login-container .btn-primary-custom {
        background: var(--color-primary);
    }
    
    .login-container .btn-primary-custom:hover {
        background: var(--color-secondary);
    }
</style>
{% endblock %}
